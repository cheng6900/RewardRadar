<style>
  :root{
    --cube: #E08A3E;
    --cube-bg: #FDF3E7;
    --cube-border: #F1C48A;
    --green: #3E9B6F;
    --green-bg: #EAF6EF;
    --green-border: #A9DDBF;
    --ink: #24292E;
    --sub: #767C82;
    --line: #E7E6E3;
    --page-bg: #F7F6F3;
    --card-bg: #FFFFFF;
    --shadow: 0 1px 2px rgba(30,30,30,0.04), 0 1px 8px rgba(30,30,30,0.03);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--page-bg);
    color: var(--ink);
    line-height:1.5;
  }
  .wrap{
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  header.top{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin-bottom: 22px;
  }
  header.top .icon{
    width:44px;
    height:44px;
    flex-shrink:0;
  }
  header.top .icon svg{ width:100%; height:100%; display:block; }
  header.top h1{
    font-size: 22px;
    margin:0 0 4px;
    font-weight:700;
    letter-spacing: 0.5px;
  }
  header.top p{
    margin:0;
    color: var(--sub);
    font-size: 13.5px;
  }

  .search-box{
    display:flex;
    align-items:center;
    gap:10px;
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
    margin-bottom: 26px;
  }
  .search-box svg{ flex-shrink:0; color:var(--sub);}
  .search-box input{
    border:none;
    outline:none;
    font-size:15px;
    flex:1;
    background:transparent;
    color:var(--ink);
    font-family:inherit;
  }
  .search-box input::placeholder{ color:#B7BABE; }

  .divider{
    height:1px;
    background:var(--line);
    margin: 0 0 24px;
  }

  /* 模擬工具 */
  .sim-card{
    background: var(--card-bg);
    border:1px solid var(--line);
    border-radius:16px;
    padding: 20px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 22px;
  }
  .sim-card h2{
    font-size:15px;
    margin:0 0 4px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .sim-card p.desc{
    margin:0 0 14px;
    color:var(--sub);
    font-size:13px;
  }
  .sim-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  .sim-row select, .sim-row input{
    flex:1;
    min-width: 180px;
    border:1px solid var(--line);
    border-radius:10px;
    padding: 11px 14px;
    font-size:14px;
    font-family:inherit;
    background:var(--card-bg);
    color:var(--ink);
    outline:none;
  }
  .sim-row select:focus, .sim-row input:focus{
    border-color:#C9C6BE;
  }
  .sim-result{
    margin-top:14px;
    font-size:13.5px;
    padding:12px 14px;
    border-radius:10px;
    display:none;
  }
  .sim-result.show{ display:block; }
  .sim-result.hit{ background:var(--green-bg); color:#276B4A; border:1px solid var(--green-border); }
  .sim-result.miss{ background:#FBEAEA; color:#A33A3A; border:1px solid #F0BEBE; }

  /* 搜尋結果 */
  #results{ margin-bottom: 8px; }
  .result-item{
    background:var(--card-bg);
    border:1px solid var(--line);
    border-left: 4px solid var(--cube);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:10px;
    box-shadow: var(--shadow);
  }
  .result-item.green{ border-left-color: var(--green); }
  .result-item .merchant-name{
    font-weight:700;
    font-size:15px;
    margin-bottom:4px;
  }
  .result-item .meta{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px;
    font-size:12.5px;
    color:var(--sub);
    margin-bottom:4px;
  }
  .tag{
    display:inline-block;
    padding:2px 10px;
    border-radius:999px;
    font-size:11.5px;
    font-weight:700;
  }
  .tag.cube{ background:var(--cube-bg); color:var(--cube); border:1px solid var(--cube-border);}
  .tag.green{ background:var(--green-bg); color:var(--green); border:1px solid var(--green-border);}
  .rate{
    font-weight:700;
    color: var(--cube);
  }
  .result-item.green .rate{ color: var(--green); }
  .result-item .note{
    font-size:12px;
    color:#98999B;
    margin-top:4px;
  }
  .no-result{
    text-align:center;
    color:var(--sub);
    font-size:14px;
    padding: 40px 20px;
    background:var(--card-bg);
    border:1px dashed var(--line);
    border-radius:14px;
  }

  /* 方案卡片(accordion) */
  .plan-card{
    background:var(--card-bg);
    border:1px solid var(--cube-border);
    border-radius:14px;
    margin-bottom:12px;
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  .plan-card.green{ border-color:var(--green-border); }
  .plan-header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px 18px;
    cursor:pointer;
    user-select:none;
  }
  .plan-header .plan-name{
    font-weight:700;
    font-size:15.5px;
  }
  .plan-header .plan-rate{
    color:var(--cube);
    font-weight:700;
    font-size:14px;
  }
  .plan-card.green .plan-rate{ color:var(--green); }
  .plan-header .plan-period{
    color:var(--sub);
    font-size:12.5px;
    margin-left:auto;
    margin-right:8px;
    white-space:nowrap;
  }
  .plan-header .chev{
    transition: transform 0.2s ease;
    color:var(--sub);
    flex-shrink:0;
  }
  .plan-card.open .chev{ transform: rotate(180deg); }
  .plan-body{
    max-height:0;
    overflow:hidden;
    transition: max-height 0.25s ease;
    border-top:1px solid var(--line);
  }
  .plan-card.open .plan-body{ border-top:1px solid var(--line); }
  .plan-body-inner{ padding: 4px 18px 16px; }
  .cat-block{
    padding: 12px 0;
    border-bottom: 1px dashed var(--line);
  }
  .cat-block:last-child{ border-bottom:none; }
  .cat-title{
    font-size:13px;
    font-weight:700;
    color: var(--ink);
    margin-bottom:6px;
  }
  .cat-merchants{
    font-size:13px;
    color:#4A4E52;
    line-height:1.7;
  }
  .cat-note{
    font-size:11.5px;
    color:#98999B;
    margin-top:6px;
  }

  .tag-cube-inline{ color: var(--cube); font-weight:700;}
  .tag-green-inline{ color: var(--green); font-weight:700;}

  footer{
    text-align:center;
    color:#A9ACAF;
    font-size:12px;
    margin-top:30px;
    line-height:1.7;
  }

  @media (max-width: 480px){
    .wrap{ padding: 20px 14px 40px; }
    header.top h1{ font-size:19px; }
    .plan-header .plan-period{ display:none; }
  }
</style>
</head>

// 攤平成單一店家清單，方便搜尋
function flatten(data){
  const list = [];
  data.forEach(plan=>{
    plan.categories.forEach(cat=>{
      cat.merchants.forEach(m=>{
        list.push({
          card: plan.card,
          plan: plan.plan,
          planPeriod: plan.planPeriod,
          category: cat.category,
          merchant: m,
          rewardRate: plan.rewardRate,
          note: cat.note || ""
        });
      });
    });
  });
  return list;
}
const FLAT = flatten(DATA);

function normalize(str){
  return str.toLowerCase().replace(/\s|　/g,"");
}

// 取回饋% 數字做排序 (取最大值)
function rateNumber(rateStr){
  if(!rateStr) return 0;
  const nums = rateStr.match(/[\d.]+/g);
  if(!nums) return 0;
  return Math.max(...nums.map(Number));
}

// ===================== 搜尋 =====================
const searchInput = document.getElementById("searchInput");
const searchResultsArea = document.getElementById("searchResultsArea");
const browseArea = document.getElementById("browseArea");
const resultsEl = document.getElementById("results");

searchInput.addEventListener("input", ()=>{
  const q = searchInput.value.trim();
  if(!q){
    searchResultsArea.style.display = "none";
    browseArea.style.display = "block";
    return;
  }
  searchResultsArea.style.display = "block";
  browseArea.style.display = "none";
  renderResults(q);
});

function renderResults(query){
  const nq = normalize(query);
  let matches = FLAT.filter(item=> normalize(item.merchant).includes(nq));
  matches.sort((a,b)=> rateNumber(b.rewardRate) - rateNumber(a.rewardRate));

  if(matches.length === 0){
    resultsEl.innerHTML = `<div class="no-result">查無此店家，可能不在回饋範圍內，建議以 App 實際交易紀錄為準</div>`;
    return;
  }

  resultsEl.innerHTML = matches.map(item=>{
    const isGreen = item.card === "Green卡";
    return `
      <div class="result-item ${isGreen ? 'green':''}">
        <div class="merchant-name">${escapeHtml(item.merchant)}</div>
        <div class="meta">
          <span class="tag ${isGreen?'green':'cube'}">${item.card}</span>
          <span>${escapeHtml(item.plan)}</span>
          <span>·</span>
          <span>${escapeHtml(item.category)}</span>
          ${item.planPeriod ? `<span>·</span><span>${item.planPeriod}</span>` : ""}
          <span class="rate">${item.rewardRate || "請見方案說明"}</span>
        </div>
        ${item.note ? `<div class="note">⚠ ${escapeHtml(item.note)}</div>` : ""}
      </div>
    `;
  }).join("");
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ===================== 方案瀏覽 (accordion) =====================
const plansContainer = document.getElementById("plansContainer");

    const isGreen = plan.card === "Green卡";

      return `
        <div class="cat-block">
          <div class="cat-title">${escapeHtml(cat.category)}</div>
          <div class="cat-merchants">${cat.merchants.map(escapeHtml).join("、")}</div>
          ${cat.note ? `<div class="cat-note">⚠ ${escapeHtml(cat.note)}</div>` : ""}
        </div>
      `;
    }).join("");

    return `
      <div class="plan-card ${isGreen?'green':''}" id="plan-${idx}">
        <div class="plan-header" onclick="togglePlan(${idx})">
          <span class="tag ${isGreen?'green':'cube'}">${plan.card}</span>
          <span class="plan-name">${escapeHtml(plan.plan)}</span>
          <span class="plan-rate">${plan.rewardRate || ""}</span>
          <span class="plan-period">${plan.planPeriod || ""}</span>
          <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="plan-body">
          <div class="plan-body-inner">${catsHtml}</div>
        </div>
      </div>
    `;
  }).join("");
}

function togglePlan(idx){
  const card = document.getElementById(`plan-${idx}`);
  const body = card.querySelector(".plan-body");
  const isOpen = card.classList.contains("open");
  if(isOpen){
    card.classList.remove("open");
    body.style.maxHeight = null;
  } else {
    card.classList.add("open");
    body.style.maxHeight = body.scrollHeight + "px";
  }
}

renderPlans();

// ===================== 切換方案模擬計算 =====================
const simPlanSelect = document.getElementById("simPlanSelect");
const simMerchantInput = document.getElementById("simMerchantInput");
const simResult = document.getElementById("simResult");

DATA.forEach((plan, idx)=>{
  const opt = document.createElement("option");
  opt.value = idx;
  opt.textContent = `${plan.card} - ${plan.plan}`;
  simPlanSelect.appendChild(opt);
});

function runSimulation(){
  const planIdx = simPlanSelect.value;
  const merchantQuery = simMerchantInput.value.trim();
  if(planIdx === "" || !merchantQuery){
    simResult.className = "sim-result";
    return;
  }
  const plan = DATA[planIdx];
  const nq = normalize(merchantQuery);
  let found = null;
  for(const cat of plan.categories){
    for(const m of cat.merchants){
      if(normalize(m).includes(nq)){
        found = {category: cat.category, merchant: m, note: cat.note};
        break;
      }
    }
    if(found) break;
  }
  if(found){
    simResult.className = "sim-result show hit";
    simResult.innerHTML = `✅ 目前方案「${escapeHtml(plan.plan)}」<b>有回饋</b>！屬於「${escapeHtml(found.category)}」分類，回饋率 ${plan.rewardRate || "請見方案說明"}。${found.note ? `<br>⚠ ${escapeHtml(found.note)}`:""}`;
  } else {
    // 檢查是否在其他方案有回饋
    let otherPlan = null;
    for(const p of DATA){
      if(p.plan === plan.plan) continue;
      for(const cat of p.categories){
        if(cat.merchants.some(m=>normalize(m).includes(nq))){
          otherPlan = p.plan;
          break;
        }
      }
      if(otherPlan) break;
    }
    simResult.className = "sim-result show miss";
    simResult.innerHTML = otherPlan
      ? `❌ 目前方案「${escapeHtml(plan.plan)}」<b>沒有回饋</b>，此店家回饋在「${escapeHtml(otherPlan)}」方案，建議切換方案再消費。`
      : `❌ 目前方案「${escapeHtml(plan.plan)}」<b>沒有回饋</b>，且此店家未列於任何回饋方案中。`;
  }
}

simPlanSelect.addEventListener("change", runSimulation);
simMerchantInput.addEventListener("input", runSimulation);
</script>
